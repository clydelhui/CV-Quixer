# Ablation: small cutoff to test Gaussian-regime behaviour.
# Kerr is always included in the gate set; this config uses a tight Fock
# truncation (cutoff_dim=6) to keep photon populations in the near-Gaussian regime.

name: cv_quixer_gaussian
model: quantum

quantum:
  num_modes: 8
  num_layers: 4
  cutoff_dim: 6
