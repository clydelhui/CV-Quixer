# Default hyperparameters shared across all experiments.
# Override specific keys in experiment-specific YAML files.

name: unnamed
model: quantum         # "quantum" or "classical"
use_wandb: false

data:
  image_size: 28
  patch_size: 4        # → 49 patches of dim 16 (4×4 pixels, 1 channel)
  num_classes: 10
  batch_size: 64
  num_workers: 2
  data_root: data/

quantum:
  num_modes: 8
  num_layers: 4
  cutoff_dim: 10
  backend: strawberryfields.fock

classical:
  embed_dim: 64
  num_heads: 4
  num_layers: 4
  mlp_ratio: 4.0
  dropout: 0.1

training:
  lr: 1.0e-3
  epochs: 30
  optimizer: adam
  weight_decay: 1.0e-4
  seed: 42
  checkpoint_dir: results/checkpoints/
  log_dir: results/logs/
  log_interval: 10
